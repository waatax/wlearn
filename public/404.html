<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLearn</title>
  <script>
    // Handle SPA routing - redirect to index.html which will handle the route
    var path = window.location.pathname;
    var basePath = '/wlearn/';
    if (path.startsWith(basePath)) {
      var route = path.substring(basePath.length);
      if (route) {
        window.location.href = basePath + '?route=' + encodeURIComponent(route);
      } else {
        window.location.href = basePath;
      }
    } else {
      window.location.href = basePath;
    }
  </script>
</head>
<body>
  <p>Loading...</p>
</body>
</html>
